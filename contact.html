    <article id="Contact">
                <h2><u>Contact Details</u></h2>
                <p>If you have any questions or feedback, Just drop a form</p>
                <p>Email: <u>vardanasaxena100@gmail.com</u></p>
                <p>Phone: 91+ 8120449425</p> 
                <p>Address: SIlicon City,Indore</p>

                <form action="https://httpbin.org/get" method="get">

                    <br><br>
            <hr>
            <br><br>
                    <fieldset>
                        <legend>Contact Form</legend>
                    <p>
                     <label for="name">Name:</label>
                     <input type="text" name="name" id="name" placeholder="Enter Your Name" autocomplete="on" required autofocus> 
                    </p>

                     <p>
                     <label for="email">Email:</label>
                        <input type="email" name="email" id="email" placeholder="Enter Your Email" required> 
                     </p> 

                     <p>
                        <label for="subject">Subject:</label>
                        <select name="subject" id="subject" required>
                            <option value="">Select a subject</option>
                            <option value="general">Bug Report</option>
                            <option value="project">Want this Project</option>
                            <option value="feedback">Feedback</option>
                            <option value="support">Support</option>        
                        </select>
                     </p>

                     <p>
                        <label id = "message-label" for="message">Message:</label>
                            <textarea name="message" id="message" placeholder="Enter Your Message" required></textarea>
                     </p>
                     

            
                     <footer>
                        <button type="submit">Submit</button>
                     </footer>
                    </fieldset>
                </form>
            </article>
</body>
